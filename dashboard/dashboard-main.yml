                show_state: true
                show_icon: true
                entity: sensor.air_bedroom_co2
          - type: tile
            entity: cover.shutter_bedroom
            name: Персиана
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Зал
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_lounge_temperature
