          - type: tile
            entity: sensor.air_bedroom_co2
            name:
              type: entity
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.air_bedroom_pm2_5
            name:
              type: entity
