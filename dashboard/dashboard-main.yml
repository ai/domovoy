            entity: climate.ac_lounge
            name: Климат
            vertical: false
            features_position: bottom
          - type: tile
            entity: cover.shutter_lounge
            name: Персиана
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Кабинет Андрея
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_andrey_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.presence_apollo_msr_2_co2
