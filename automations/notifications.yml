- alias: Уведомить о разряде батареи
  triggers:
    - trigger: time
      at: '10:00:00'
  conditions:
    - condition: template
      value_template: "{{ sensors != '' }}"
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - action: notify.mobile_app_phone_bedoll
      data:
        title: Дом
        message: 'Садиться батарея: {{ sensors }}'
  mode: single
  variables:
    threshold: 30
    sensors: "{% set result = namespace(sensors=[]) %} {% for state in states.sensor | selectattr('attributes.device_class', '==', 'battery') %}\n  {% if 0 <= state.state | int(-1) < threshold | int %}\n    {% set result.sensors = result.sensors + [state.name ~ ' (' ~ state.state ~ ' %)'] %}\n  {% endif %}\n{% endfor %} {{result.sensors|join(', ')}}"
- alias: Протечка воды в ванной
  triggers:
    - trigger: state
      entity_id: binary_sensor.water_bathroom_water_leak
      from: 'off'
      to: 'on'
  actions:
    - action: notify.notify
      data:
        title: Ванная
        message: Протечка воды
  mode: single
- alias: Протечка воды на кухне
