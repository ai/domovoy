- id: automation.bathroom_fan_humidity
  alias: Вентилятор в ванной по влажности
  triggers:
    - trigger: template
      id: high
      value_template: "{% set b = states('sensor.air_bathroom_humidity')|float(none) %}{% set vals = ['sensor.temperature_kitchen_humidity', 'sensor.temperature_lounge_humidity', 'sensor.temperature_children_humidity']|map('states')|map('float', none)|reject('none')|list %}{% set k = vals|max if vals|length > 0 else none %}{{ b is not none and k is not none and (b - k) >= 5 }}"
    - trigger: template
      id: normal
      value_template: "{% set b = states('sensor.air_bathroom_humidity')|float(none) %}{% set vals = ['sensor.temperature_kitchen_humidity', 'sensor.temperature_lounge_humidity', 'sensor.temperature_children_humidity']|map('states')|map('float', none)|reject('none')|list %}{% set k = vals|max if vals|length > 0 else none %}{{ b is not none and k is not none and (b - k) < 3 }}"
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: high
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.wall_switch_bathroom_l2
        - conditions:
            - condition: trigger
              id: normal
          sequence:
            - action: switch.turn_off
              target:
                entity_id: switch.wall_switch_bathroom_l2
  mode: single

- id: automation.kitchen_fan_auto_off
  alias: Авто-выключение вентилятора на кухне
  triggers:
    - trigger: state
      entity_id: switch.wall_switch_kitchen_fan
      to: 'on'
      for:
        hours: 2
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - action: switch.turn_off
      target:
        entity_id: switch.wall_switch_kitchen_fan
  mode: single

- id: automation.co2_ventilation
  alias: Вентиляция для снижения CO²
  triggers:
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'off'
      id: occupied
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'on'
      id: empty
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: occupied
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.wall_switch_toilet_l2
        - conditions:
            - condition: trigger
              id: empty
          sequence:
            - action: switch.turn_off
              target:
                entity_id: switch.wall_switch_toilet_l2
  mode: single
