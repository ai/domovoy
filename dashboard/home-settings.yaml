views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Режимы
            heading_style: title
          - type: tile
            entity: input_boolean.empty_home
          - type: tile
            entity: input_boolean.stop
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
          - type: tile
            entity: input_boolean.heating
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
          - type: tile
            entity: input_boolean.cooling
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
          - type: tile
            entity: input_boolean.cat_alone
          - type: tile
            entity: switch.adaptive_lighting_service_sleep_mode
            name: Ночной режим
            vertical: false
            tap_action:
              action: toggle
            icon_tap_action:
              action: toggle
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Питание
            heading_style: title
          - type: tile
            entity: switch.wall_switch_andrey
            name:
              type: area
            icon: mdi:penguin
            show_entity_picture: false
            hide_state: false
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.wall_switch_kitchen_worktop
            name:
              type: area
            icon: mdi:fridge
            hide_state: false
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.wall_switch_bathroom_l1
            name:
              type: area
            icon: mdi:shower
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.wall_switch_toilet_l1
            name:
              type: area
            icon: mdi:ideogram-cjk
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
          - type: tile
            entity: switch.plug_dishwasher
            name: Посудомойка
            icon: mdi:dishwasher
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
          - type: tile
            entity: switch.plug_washing_machine
            name: Стиральная машина
            icon: mdi:washing-machine
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Вытяжка
            heading_style: title
          - type: tile
            entity: switch.wall_switch_toilet_l2
            name: Общий
            icon: mdi:fan
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
          - type: tile
            entity: switch.wall_switch_bathroom_l2
            name:
              type: area
            icon: mdi:fan
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Время
            heading_style: title
          - type: tile
            entity: input_datetime.night_start
          - type: tile
            entity: input_datetime.night_end
    max_columns: 3
    cards: []
