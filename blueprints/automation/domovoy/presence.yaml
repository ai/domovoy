blueprint:
  name: Presence light
  description: Turns the light on while someone is in the room
  domain: automation
  author: Andrey Sitnik
  source_url: https://github.com/ai/domovoy/blob/main/blueprints/automation/domovoy/presence.yaml
  input:
    presence_sensor:
      name: Presence sensor
      selector:
        entity:
          filter:
            - device_class: occupancy
              domain: binary_sensor
            - device_class: motion
              domain: binary_sensor
            - device_class: presence
              domain: binary_sensor
    light:
      name: Light
      selector:
        target:
          entity:
            domain: light
    before_on:
      name: Extra action on turn on
      default: []
      selector:
        action: {}
    after_off:
      name: Extra action on turn off
      default: []
      selector:
        action: {}
    manual_flag:
      name: Manual flag
      description: >-
        input_boolean that blocks auto-off while it is on. Set by the wall
        switch blueprint when the light was turned on manually
      selector:
        entity:
          filter:
            - domain: input_boolean
    adaptive_switch:
      name: Adaptive lighting
      description: >-
        When set, the light is turned on through Adaptive Lighting so it starts
        at the correct color temperature instead of flashing its last value
      default: ''
      selector:
        entity:
          filter:
            - domain: switch
              integration: adaptive_lighting

variables:
  adaptive_switch: !input adaptive_switch
  light_target: !input light

mode: restart

triggers:
  - trigger: state
    entity_id: !input presence_sensor
    from: 'off'
    to: 'on'

conditions:
  - condition: state
    entity_id: input_boolean.stop
    state: 'off'
  - condition: state
    entity_id: input_boolean.cat_alone
    state: 'off'
  - condition: state
    entity_id: !input manual_flag
    state: 'off'

actions:
  - sequence: !input before_on
  - if:
      - condition: template
        value_template: "{{ adaptive_switch != '' }}"
    then:
      # Turn on instantly at Adaptive Lighting's current values (explicit
      # properties bypass its intercept, so no extra transition), then hand
      # control back so it keeps adapting the light over time
      - action: light.turn_on
        target: !input light
        data:
          brightness_pct: "{{ state_attr(adaptive_switch, 'brightness_pct') | int(100) }}"
          color_temp_kelvin: "{{ state_attr(adaptive_switch, 'color_temp_kelvin') | int(2700) }}"
          transition: 0
      - action: adaptive_lighting.set_manual_control
        data:
          entity_id: !input adaptive_switch
          lights: "{{ light_target.entity_id }}"
          manual_control: false
    else:
      - action: light.turn_on
        target: !input light
        data:
          transition: 0
  - wait_for_trigger:
      trigger: state
      entity_id: !input presence_sensor
      from: 'on'
      to: 'off'
  - if:
      - condition: state
        entity_id: input_boolean.stop
        state: 'off'
      - condition: state
        entity_id: !input manual_flag
        state: 'off'
    then:
      - action: light.turn_off
        target: !input light
        data:
          transition: 0
      - sequence: !input after_off
