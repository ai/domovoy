views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Улица
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.weather_waqi_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.weather_waqi_humidity
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/street
          - type: gauge
            entity: sensor.weather_aemet_temperature_feeling
            name: Ощущается как
            grid_options:
              columns: 4
              rows: auto
            min: 5
            max: 40
            severity:
              green: 0
              yellow: 24
              red: 30
            visibility:
              - condition: state
                entity: weather.weather_aemet
                state_not:
                  - unavailable
                  - unknown
          - type: gauge
            entity: sensor.weather_meteo_france_les_corts_temperature
            name: Температура
            grid_options:
              columns: 4
              rows: auto
            min: 5
            max: 40
            severity:
              green: 0
              yellow: 24
              red: 30
            visibility:
              - condition: state
                entity: weather.weather_aemet
                state:
                  - unavailable
                  - unknown
          - type: gauge
            entity: sensor.weather_aemet_rain_probability
            grid_options:
              columns: 4
              rows: auto
            name: Дождь
            visibility:
              - condition: state
                entity: weather.weather_aemet
                state_not:
                  - unavailable
                  - unknown
          - type: gauge
            entity: sensor.weather_waqi_pm2_5
            grid_options:
              columns: 4
              rows: auto
            name: Воздух
            severity:
              green: 0
              yellow: 50
              red: 0
      - type: grid
        cards:
          - type: heading
            heading: Дом
            heading_style: title
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/home
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.meter_flashes_power
          - type: tile
            entity: sensor.air_bedroom_pm2_5
            name: В спальне плохой воздух
            icon: mdi:home-alert
            color: red
            vertical: false
            features_position: bottom
            visibility:
              - condition: numeric_state
                above: 20
          - type: tile
            entity: script.turn_off_everything
            icon: mdi:lightbulb-off
            hide_state: true
            vertical: false
            tap_action:
              action: perform-action
              perform_action: script.turn_off_everything
              target: {}
            features_position: bottom
          - type: tile
            visibility:
              - condition: state
                state: 'off'
              - condition: state
                entity: input_boolean.empty_home
                state: 'off'
            entity: switch.wall_switch_toilet_l2
            name: Общая вытяжка
            icon: mdi:fan-alert
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
          - type: tile
            visibility:
              - condition: state
                state: 'on'
            entity: input_boolean.empty_home
            vertical: false
            icon_tap_action:
              action: none
            features_position: bottom
          - type: tile
            entity: vacuum.vacuum_q7_max
            name: Пылесос
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Кабинет Андрея
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_andrey_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.presence_apollo_msr_2_co2
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/andrey
          - type: tile
            entity: light.light_group_andrey
            name: Свет
            vertical: false
            features_position: bottom
          - type: tile
            entity: cover.shutter_andrey
            name: Персиана
            vertical: false
            features_position: bottom
          - type: tile
            entity: climate.ac_andrey
            name: Климат
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Спальня
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_bedroom_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_bedroom_co2
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/bedroom
          - type: tile
            entity: light.light_group_bedroom
            name: Свет
            vertical: false
            features_position: bottom
          - type: tile
            entity: cover.shutter_bedroom
            name: Персиана
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Зал
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_lounge_temperature
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/lounge
          - type: tile
            entity: climate.ac_lounge
            name: Климат
            vertical: false
            features_position: bottom
          - type: tile
            entity: cover.shutter_lounge
            name: Персиана
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Кабинет Кати
            heading_style: title
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/katya
          - type: tile
            entity: light.light_group_kate
            name: Свет
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Детская
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_children_temperature
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/children
          - type: tile
            entity: light.light_group_children
            name: Свет
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Кухня
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_kitchen_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_kitchen_humidity
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/kitchen
          - type: tile
            entity: light.light_group_kitchen
            name: Свет
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.wall_switch_kitchen_fan
            name: Вытяжка
            icon: mdi:fan
            vertical: false
            tap_action:
              action: toggle
            icon_tap_action:
              action: none
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Ванная
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_bathroom_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_bathroom_humidity
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/bathroom
          - type: tile
            entity: switch.wall_switch_bathroom_l1
            name: Свет
            icon: mdi:lightbulb
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.wall_switch_bathroom_l2
            name: Вентилятор
            icon: mdi:fan
            vertical: false
            tap_action:
              action: toggle
            icon_tap_action:
              action: none
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Туалет
            heading_style: title
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/toilet
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.presence_toilet_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.presence_toilet_humidity
          - type: tile
            entity: light.light_group_toilet
            name: Свет
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Прихожая
            heading_style: title
          - type: tile
            entity: binary_sensor.door_main_dver
            name: Дверь
            state_content:
              - state
              - last-changed
          - type: tile
            visibility:
              - condition: state
                entity: input_boolean.empty_home
                state: 'off'
            entity: script.empty_home
            name: Мы ушли
            hide_state: true
            vertical: false
            tap_action:
              action: perform-action
              perform_action: script.empty_home
              target: {}
            features_position: bottom
    max_columns: 3
    title: Общее
    cards: []
  - type: sections
    max_columns: 3
    title: Улица
    path: street
    sections:
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading: Погода
            heading_style: title
          - type: custom:weather-chart-card
            entity: weather.weather_aemet
            show_main: true
            show_temperature: true
            show_current_condition: false
            show_attributes: false
            show_time: false
            show_time_seconds: false
            show_day: false
            show_date: false
            show_humidity: true
            show_pressure: true
            show_wind_direction: true
            show_wind_speed: true
            show_sun: true
            show_feels_like: false
            show_dew_point: false
            show_wind_gust_speed: false
            show_visibility: false
            show_last_changed: false
            use_12hour_format: false
            icons_size: 25
            animated_icons: false
            icon_style: style1
            autoscroll: false
            forecast:
              precipitation_type: rainfall
              show_probability: false
              labels_font_size: '11'
              precip_bar_size: '100'
              style: style1
              show_wind_forecast: true
              condition_icons: true
              round_temp: false
              type: daily
              number_of_forecasts: '0'
              disable_animation: false
      - type: grid
        cards:
          - type: heading
            heading: Солнце
            heading_style: title
          - type: custom:horizon-card
    subview: true
    cards: []
  - type: sections
    max_columns: 3
    subview: true
    path: home
    title: Дом
    sections:
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading_style: title
            heading: Потребление электричества
          - type: tile
            grid_options:
              columns: 6
              rows: 2
            entity: sensor.meter_flashes_power
            name: Сейчас
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: tile
            entity: sensor.current_cost_per_minute
            name: Платим
            icon: mdi:currency-eur
            vertical: false
            features:
              - type: trend-graph
            features_position: bottom
          - type: heading
            heading: Тариф
            heading_style: subtitle
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.pepeenergy_price
          - type: custom:tariff-chart-card
            visibility:
              - condition: state
                entity: binary_sensor.workday
                state: 'on'
            currentTimeLine:
              labelColor: '#000000'
            yAxis:
              min: 0
              max: 25
              title: 0,xx €/kWh
            tariffs:
              - name: Дешёвый
                value: 15
                timeFrames:
                  - 00:00-08:00
                color: '#00E5FF'
              - name: Средний
                value: 18
                timeFrames:
                  - 08:00-10:00
                  - 14:00-18:00
                  - 22:00-24:00
                color: '#FF9800'
              - name: Дорогой
                value: 25
                timeFrames:
                  - 10:00-14:00
                  - 18:00-22:00
                color: '#FF5252'
          - type: custom:tariff-chart-card
            visibility:
              - condition: state
                entity: binary_sensor.workday
                state: 'off'
            currentTimeLine:
              labelColor: '#000000'
            yAxis:
              min: 0
              title: 0,xx €/kWh
            tariffs:
              - name: Дешёвый
                value: 15
                timeFrames:
                  - 00:00-23:00
                color: '#00E5FF'
              - name: Дешёвый
                value: 25
                timeFrames:
                  - 23:55-24:00
                color: '#00E5FF'
      - type: grid
        cards:
          - type: heading
            heading: Люди
            heading_style: title
          - type: tile
            entity: person.andrey
            features_position: bottom
            vertical: false
            show_entity_picture: true
          - type: tile
            entity: person.kate
            features_position: bottom
            vertical: false
            show_entity_picture: true
      - type: grid
