- id: automation.heating_cooling_interlock
  alias: Взаимоблокировка обогрева и охлаждения
  triggers:
    - trigger: state
      entity_id: input_boolean.cooling
      to: 'on'
      id: cooling
    - trigger: state
      entity_id: input_boolean.heating
      to: 'on'
      id: heating
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: cooling
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.heating
        - conditions:
            - condition: trigger
              id: heating
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.cooling
  mode: single

- id: automation.ac_andrey_night_off
  alias: Выключить кондиционер Андрея ночью
  triggers:
    - trigger: time
      at: '20:00:00'
    - trigger: numeric_state
      entity_id: sensor.ac_andrey_outside_temperature
      below: 30
    - trigger: time
      at: '00:00:00'
      id: midnight
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
    - condition: state
      entity_id: input_boolean.cooling
      state: 'on'
    - condition: or
      conditions:
        - condition: trigger
          id: midnight
        - condition: and
          conditions:
            - condition: time
              after: '20:00:00'
            - condition: numeric_state
              entity_id: sensor.ac_andrey_outside_temperature
              below: 30
  actions:
    - action: climate.turn_off
      target:
        entity_id: climate.ac_andrey
  mode: single
