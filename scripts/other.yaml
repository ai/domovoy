- id: script.clean_cat_fountain
  alias: Помыли поилку кошке
  sequence:
    - action: button.press
      target:
        entity_id: button.fountain_dockstream_2_filter_reset
    - action: button.press
      target:
        entity_id: button.fountain_dockstream_2_cleaning_reset

- id: script.turn_off_everything
  alias: Выключить всё
  sequence:
    - action: light.turn_off
      metadata: {}
      data: {}
      target:
        entity_id:
          - light.light_group_kate
          - light.light_group_andrey
          - light.light_group_toilet
          - light.light_group_kitchen
    - action: switch.turn_off
      metadata: {}
      target:
        entity_id: switch.wall_switch_bathroom_l1
      data: {}

- id: script.empty_home
  alias: Пометить дом пустым
  icon: mdi:home-export-outline
  mode: single
  sequence:
    - action: input_boolean.turn_on
      target:
        entity_id: input_boolean.empty_home
    - action: timer.start
      target:
        entity_id: timer.empty_home
      data:
        duration: '00:30:00'

- id: script.zigbee_reset
  alias: Zigbee reset
  use_blueprint:
    path: bonesderdritte/ikea_kajplats_zigbee_pairing_mode_power_cycle.yaml
    input:
      target_switch: switch.plug_washing_machine
