- id: automation.autolight_toiltet
  alias: Авто-включение света в туалете
  room: toilet
  use_blueprint:
    path: domovoy/presence.yaml
    input:
      presence_sensor: binary_sensor.presence_toilet_presence
      light:
        entity_id: light.light_group_toilet
      manual_flag: input_boolean.stop_toilet
      adaptive_switch: switch.adaptive_lighting_service

- id: automation.service_lights_night_mode
  alias: Ночной режим света в технической зоне
  triggers:
    - trigger: time
      at: input_datetime.night_start
      id: start
    - trigger: time
      at: input_datetime.night_end
      id: end
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: start
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.adaptive_lighting_service_sleep_mode
      default:
        - action: switch.turn_off
          target:
            entity_id: switch.adaptive_lighting_service_sleep_mode
  mode: single

- id: automation.vykliuchatel_sveta_v_spalne
  alias: Выключатель света в спальне
  room: bedroom
