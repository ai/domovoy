- id: automation.bathroom_fan_humidity
  alias: Вентилятор в ванной по влажности
  triggers:
    - trigger: template
      id: high
      value_template: "{% set b = states('sensor.air_bathroom_humidity')|float(none) %}{% set vals = ['sensor.temperature_kitchen_humidity', 'sensor.temperature_lounge_humidity', 'sensor.temperature_children_humidity']|map('states')|map('float', none)|reject('none')|list %}{% set k = (vals|sum / vals|length) if vals|length > 0 else none %}{{ b is not none and k is not none and (b - k) >= 5 }}"
    - trigger: template
      id: normal
      value_template: "{% set b = states('sensor.air_bathroom_humidity')|float(none) %}{% set vals = ['sensor.temperature_kitchen_humidity', 'sensor.temperature_lounge_humidity', 'sensor.temperature_children_humidity']|map('states')|map('float', none)|reject('none')|list %}{% set k = (vals|sum / vals|length) if vals|length > 0 else none %}{{ b is not none and k is not none and (b - k) < 3 }}"
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: high
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.wall_switch_bathroom_l2
        - conditions:
            - condition: trigger
              id: normal
          sequence:
            - action: switch.turn_off
              target:
                entity_id: switch.wall_switch_bathroom_l2
  mode: single

- id: automation.presence_power_save
  alias: Сохранение батареи датчика присутствия
  triggers:
    - trigger: state
      entity_id: input_boolean.empty_home
    - trigger: state
      entity_id: input_boolean.cat_alone
    - trigger: time
      at: input_datetime.night_start
    - trigger: time
      at: input_datetime.night_end
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_boolean.empty_home
                  state: 'on'
                - condition: state
                  entity_id: input_boolean.cat_alone
                  state: 'on'
                - condition: time
                  after: input_datetime.night_start
                  before: input_datetime.night_end
          sequence:
            - action: select.select_option
              target:
                entity_id: select.presence_toilet_motion_detection_mode
              data:
                option: only_pir
      default:
        - action: select.select_option
          target:
            entity_id: select.presence_toilet_motion_detection_mode
          data:
            option: pir_and_radar
  mode: single
