blueprint:
  name: Ночной режим по удержанию выключателя
  domain: automation
  author: Andrey Sitnik
  source_url: https://github.com/ai/domovoy/blob/main/blueprints/automation/domovoy/warm-min-on-hold.yaml
  input:
    wall_switch:
      name: Выключатель
      selector:
        device:
          filter:
            - integration: mqtt
              manufacturer: Shelly
    light_target:
      name: Лампа
      selector:
        entity:
          filter:
            - domain: light
    daylight_switch:
      name: Адаптивное освещение
      default: switch.daylight_adaptive_lighting_daylight
      selector:
        entity:
          filter:
            - domain: switch

variables:
  light_entity: !input light_target
  daylight_switch: !input daylight_switch

mode: single

triggers:
  - trigger: device
    domain: mqtt
    device_id: !input wall_switch
    type: action
    subtype: input_1_hold

conditions: []

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ (state_attr(light_entity, 'brightness') | int(0) * 100 / 255) | round(0) == 1 }}"
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_target
            data:
              brightness_pct: "{{ state_attr(daylight_switch, 'brightness_pct') | round(0) }}"
              color_temp_kelvin: "{{ state_attr(daylight_switch, 'color_temp_kelvin') | int }}"
              transition: 1
    default:
      - action: light.turn_on
        target:
          entity_id: !input light_target
        data:
          brightness_pct: 1
          color_temp_kelvin: "{{ state_attr(light_entity, 'min_color_temp_kelvin') | int(2202) }}"
          transition: 1
