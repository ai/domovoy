- id: binary_sensor.heating_sun
  name: Heating sun
  state: "{% set sunny = ['sunny', 'partlycloudy', 'windy', 'windy-variant', 'clear-night', 'unavailable', 'unknown'] %}\n{% set aemet = states('weather.weather_aemet') %}\n{% set mf = states('weather.weather_meteo_france_les_corts') %}\n{{ aemet in sunny and mf in sunny }}"
  device_class: heat

- id: binary_sensor.workday
  name: Рабочий день
  state: '{{ now().weekday() < 5 }}'

- id: sensor.average_humidity
  name: Средняя влажность
  state: "{% set entities = ['sensor.temperature_andrey_humidity', 'sensor.air_bathroom_humidity', 'sensor.air_bedroom_humidity', 'sensor.temperature_children_humidity', 'sensor.temperature_kitchen_humidity', 'sensor.temperature_lounge_humidity', 'sensor.presence_toilet_humidity'] %}\n{% set values = entities | map('states') | select('is_number') | map('float') | list %}\n{{ (values | average) | round(1) if values | count > 0 else none }}"
  unit_of_measurement: '%'
  device_class: humidity
  state_class: measurement
  availability: "{{ ['sensor.temperature_andrey_humidity', 'sensor.air_bathroom_humidity', 'sensor.air_bedroom_humidity', 'sensor.temperature_children_humidity', 'sensor.temperature_kitchen_humidity', 'sensor.temperature_lounge_humidity', 'sensor.presence_toilet_humidity'] | map('states') | select('is_number') | list | count > 0 }}"

- id: sensor.average_temperature
  name: Средняя температура
  state: "{% set entities = ['sensor.temperature_andrey_temperature', 'sensor.air_bathroom_temperature', 'sensor.air_bedroom_temperature', 'sensor.temperature_children_temperature', 'sensor.temperature_kitchen_temperature', 'sensor.temperature_lounge_temperature', 'sensor.presence_toilet_temperature'] %}\n{% set values = entities | map('states') | select('is_number') | map('float') | list %}\n{{ (values | average) | round(1) if values | count > 0 else none }}"
  unit_of_measurement: °C
  device_class: temperature
  state_class: measurement
  availability: "{{ ['sensor.temperature_andrey_temperature', 'sensor.air_bathroom_temperature', 'sensor.air_bedroom_temperature', 'sensor.temperature_children_temperature', 'sensor.temperature_kitchen_temperature', 'sensor.temperature_lounge_temperature', 'sensor.presence_toilet_temperature'] | map('states') | select('is_number') | list | count > 0 }}"

- id: sensor.current_cost_per_minute
  name: Current Cost Per Minute
  state: "{{ (states('sensor.pepeenergy_price')|float(0) * states('sensor.meter_flashes_power')|float(0) / 60000) | round(5) }}"
  unit_of_measurement: €/min
  state_class: measurement

- id: sensor.meter_ac_energy
  name: Meter / AC Energy
  room: lounge
  state: "{{ (states('sensor.ac_andrey_energy_consumed')|float(0) + states('sensor.ac_lounge_energy_consumed')|float(0)) | round(2) }}"
  unit_of_measurement: kWh
  device_class: energy
  state_class: total_increasing
  availability: "{{ has_value('sensor.ac_andrey_energy_consumed') and has_value('sensor.ac_lounge_energy_consumed') }}"

- id: sensor.pepeenergy_price
  name: Pepeenergy Price
  state: "{% set h = now().hour %}{% if is_state('binary_sensor.workday','off') or h < 8 %}0.1501{% elif (10 <= h < 14) or (18 <= h < 22) %}0.2731{% else %}0.1888{% endif %}"
  unit_of_measurement: €/kWh
  state_class: measurement
