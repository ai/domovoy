- id: automation.high_co2_notification_andrey
  alias: Высокий уровень CO² у Андрея
  triggers:
    - trigger: numeric_state
      entity_id: sensor.presence_apollo_msr_2_co2
      above: 1000
  conditions:
    - condition: state
      entity_id: person.andrey
      state: home
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - action: notify.mobile_app_phone_bedoll
      data:
        title: Кабинет Андрея
        message: "Высокий уровень CO²: {{ states('sensor.presence_apollo_msr_2_co2') }}"
        data:
          tag: co2_andrey
  mode: single

- id: automation.high_co2_notification_bedroom
  alias: Высокий CO² в спальне ночью
  triggers:
    - trigger: numeric_state
      entity_id: sensor.air_bedroom_co2
      above: 1000
      id: detect
    - trigger: time
      at: input_datetime.night_start
      id: night_start
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
    - condition: time
      after: input_datetime.night_start
      before: input_datetime.night_end
    - condition: numeric_state
      entity_id: sensor.air_bedroom_co2
      above: 1000
  actions:
    - action: notify.mobile_app_phone_bedoll
      data:
        title: Спальня
        message: 'Ночью высокий уровень CO²: {{ states("sensor.air_bedroom_co2") }}'
        data:
          tag: co2_bedroom
          channel: Maintenance
          importance: low
  mode: single

- id: automation.cat_fountain_cleaning
  alias: Чистка поилки кошки
  triggers:
    - trigger: numeric_state
      entity_id: sensor.fountain_dockstream_2_remaining_filter_day
      below: 1
      id: notify
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: FOUNTAIN_WASHED
      id: washed
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: notify
          sequence:
            - action: notify.mobile_app_phone_bedoll
              data:
                title: Поилка кошки
                message: Нужно помыть
                data:
                  tag: fountain_clean
                  actions:
                    - action: FOUNTAIN_WASHED
                      title: Помыто
        - conditions:
            - condition: trigger
              id: washed
          sequence:
            - action: script.turn_on
              target:
                entity_id: script.clean_cat_fountain
            - action: notify.mobile_app_phone_bedoll
              data:
                message: clear_notification
                data:
                  tag: fountain_clean
  mode: single

- id: automation.cat_fountain_low_water
  alias: Мало воды в поилке кошке
  triggers:
    - trigger: numeric_state
      entity_id: sensor.fountain_dockstream_2_remaining_water_2
      below: 40
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - action: notify.mobile_app_phone_bedoll
      data:
        title: Поилка кошки
        message: 'Мало воды: {{ states("sensor.fountain_dockstream_2_remaining_water_2") }}%'
  mode: single

- id: automation.missing_devices
  alias: Пропавшие устройства
  triggers:
    - trigger: time_pattern
      id: periodic
      hours: /1
      minutes: 0
    - trigger: state
      entity_id: person.andrey
      to: home
      id: home
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
    - condition: state
      entity_id: person.andrey
      state: home
    - condition: template
      value_template: "{{ missing != '' }}"
  actions:
    - action: notify.mobile_app_phone_bedoll
      data:
        title: Дом
        message: 'Пропали из системы: {{ missing }}'
        data:
          tag: missing_devices
          channel: Maintenance
          importance: low
  variables:
    missing: "{% set ns = namespace(names=[]) %}{% for s in states | selectattr('state', '==', 'unavailable') | rejectattr('domain', 'in', ['group', 'scene', 'script', 'automation', 'button', 'input_button', 'update']) %}{% if (now() - s.last_changed).total_seconds() > 30 * 60 %}{% set did = device_id(s.entity_id) %}{% set name = (device_attr(did, 'name_by_user') or device_attr(did, 'name')) if did else s.name %}{% if name and name not in ns.names %}{% set ns.names = ns.names + [name] %}{% endif %}{% endif %}{% endfor %}{{ ns.names | join(', ') }}"
  mode: single

