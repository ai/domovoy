- id: automation.empty_home_button
  alias: Кнопка «Пустой дом»
  room: entrance
  triggers:
    - trigger: device
      domain: mqtt
      device_id: 051afa3d576af13df00f57ac4f8a7ff6
      type: action
      subtype: toggle_b1_down
      id: set
    - trigger: device
      domain: mqtt
      device_id: 051afa3d576af13df00f57ac4f8a7ff6
      type: action
      subtype: toggle_b2_down
      id: vacuum
    - trigger: device
      domain: mqtt
      device_id: 051afa3d576af13df00f57ac4f8a7ff6
      type: action
      subtype: toggle_b1_up
      id: clear
    - trigger: device
      domain: mqtt
      device_id: 051afa3d576af13df00f57ac4f8a7ff6
      type: action
      subtype: toggle_b2_up
      id: clear
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: clear
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.empty_home
      default:
        - action: script.turn_on
          target:
            entity_id: script.empty_home
        - if:
            - condition: trigger
              id: vacuum
          then:
            - action: vacuum.start
              target:
                entity_id: vacuum.vacuum_q7_max
  mode: single

- id: automation.empty_home_devices
  alias: Выключить всё в пустом доме
  triggers:
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'on'
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - action: script.turn_off_everything
    - action: climate.turn_off
      metadata: {}
      target:
        entity_id: climate.ac_andrey
      data: {}
  mode: single

- id: automation.empty_home_presence
  alias: Обновление «Пустой дом»
  room: entrance
  triggers:
    - trigger: state
      entity_id: zone.home
      from: '0'
      id: arrived
    - trigger: state
      entity_id: zone.home
      to: '0'
      id: emptied
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: arrived
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.empty_home
        - conditions:
            - condition: trigger
              id: emptied
            - condition: state
              entity_id: timer.empty_home
              state: active
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.empty_home
  mode: single

- id: automation.presence_power_save
  alias: Сохранение батареи датчика присутствия
  room: toilet
  triggers:
    - trigger: state
      entity_id: input_boolean.empty_home
    - trigger: state
      entity_id: input_boolean.cat_alone
    - trigger: time
      at: input_datetime.night_start
    - trigger: time
      at: input_datetime.night_end
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: or
              conditions:
                - condition: state
                  entity_id: input_boolean.empty_home
                  state: 'on'
                - condition: state
                  entity_id: input_boolean.cat_alone
                  state: 'on'
                - condition: time
                  after: input_datetime.night_start
                  before: input_datetime.night_end
          sequence:
            - action: select.select_option
              target:
                entity_id: select.presence_toilet_motion_detection_mode
              data:
                option: only_pir
      default:
        - action: select.select_option
          target:
            entity_id: select.presence_toilet_motion_detection_mode
          data:
            option: pir_and_radar
  mode: single
