views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Улица
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.weather_aemet_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.weather_aemet_humidity
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.weather_waqi_pm2_5
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/street
          - type: gauge
            entity: sensor.weather_aemet_temperature_feeling
            name: Ощущается как
            grid_options:
              columns: 4
              rows: auto
            min: 5
            max: 40
            severity:
              green: 0
              yellow: 24
              red: 30
          - type: gauge
            entity: sensor.weather_aemet_rain_probability
            grid_options:
              columns: 4
              rows: auto
            name: Дождь
          - type: gauge
            entity: sensor.weather_waqi_pm2_5
            grid_options:
              columns: 4
              rows: auto
            name: Воздух
            severity:
              green: 0
              yellow: 50
              red: 0
      - type: grid
        cards:
          - type: heading
            heading: Дом
            heading_style: title
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/home
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.meter_panel_total_power
          - type: tile
            entity: script.turn_off_everything
            icon: mdi:lightbulb-off
            hide_state: true
            vertical: false
            tap_action:
              action: perform-action
              perform_action: script.turn_off_everything
              target: {}
            features_position: bottom
          - type: tile
            visibility:
              - condition: state
                state: 'off'
              - condition: state
                entity: input_boolean.empty_home
                state: 'off'
            entity: switch.wall_switch_toilet_l2
            name: Общая вытяжка
            icon: mdi:fan-alert
            vertical: false
            tap_action:
              action: toggle
            features_position: bottom
          - type: tile
            visibility:
              - condition: state
                state: 'on'
            entity: input_boolean.empty_home
            vertical: false
            icon_tap_action:
              action: none
            features_position: bottom
          - type: tile
            entity: vacuum.vacuum_q7_max
            name: Пылесос
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Кабинет Андрея
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_andrey_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.presence_apollo_msr_2_co2
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/andrey
          - type: tile
            entity: light.light_group_andrey
            name: Свет
            vertical: false
            features_position: bottom
          - type: tile
            entity: cover.shutter_andrey
            name: Персиана
            vertical: false
            features_position: bottom
          - type: tile
            entity: climate.ac_andrey
            name: Климат
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Спальня
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_bedroom_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_bedroom_co2
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/bedroom
          - type: tile
            entity: light.light_group_bedroom
            name: Свет
            vertical: false
            features_position: bottom
          - type: tile
            entity: cover.shutter_bedroom
            name: Персиана
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Зал
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_lounge_temperature
          - type: tile
            entity: climate.ac_lounge
            name: Климат
            vertical: false
            features_position: bottom
          - type: tile
            entity: cover.shutter_lounge
            name: Персиана
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Кабинет Кати
            heading_style: title
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/katya
          - type: tile
            entity: light.light_group_kate
            name: Свет
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Детская
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_children_temperature
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/children
          - type: tile
            entity: light.light_group_children
            name: Свет
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Кухня
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_kitchen_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.temperature_kitchen_humidity
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/kitchen
          - type: tile
            entity: light.light_group_kitchen
            name: Свет
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.wall_switch_kitchen_fan
            name: Вытяжка
            icon: mdi:fan
            vertical: false
            tap_action:
              action: toggle
            icon_tap_action:
              action: none
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Ванная
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_bathroom_temperature
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_bathroom_humidity
          - type: tile
            entity: switch.wall_switch_bathroom_l1
            name: Свет
            icon: mdi:lightbulb
            vertical: false
            features_position: bottom
          - type: tile
            entity: switch.wall_switch_bathroom_l2
            name: Вентилятор
            icon: mdi:fan
            vertical: false
            tap_action:
              action: toggle
            icon_tap_action:
              action: none
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Туалет
            heading_style: title
            tap_action:
              action: navigate
              navigation_path: /dashboard-main/toilet
          - type: tile
            entity: light.light_group_toilet
            name: Свет
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Прихожая
            heading_style: title
          - type: tile
            visibility:
              - condition: state
                entity: input_boolean.empty_home
                state: 'off'
            entity: script.empty_home
            name: Мы ушли
            hide_state: true
            vertical: false
            tap_action:
              action: perform-action
              perform_action: script.empty_home
              target: {}
            features_position: bottom
    max_columns: 3
    title: Общее
    cards: []
  - type: sections
    max_columns: 3
    title: Улица
    path: street
    sections:
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading: Погода
            heading_style: title
          - show_current: true
            show_forecast: true
            type: weather-forecast
            entity: weather.weather_aemet
            forecast_type: hourly
            round_temperature: true
          - show_current: false
            show_forecast: true
            type: weather-forecast
            entity: weather.weather_aemet
            forecast_type: daily
          - type: gauge
            severity:
              green: 0
              yellow: 50
              red: 100
            grid_options:
              columns: 3
              rows: auto
            name: Воздух
            entity: sensor.weather_waqi_pm2_5
    subview: true
    cards: []
  - type: sections
    max_columns: 4
    subview: true
    path: home
    title: Дом
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Тариф на электричество
            heading_style: title
          - type: custom:tariff-chart-card
            visibility:
              - condition: state
                entity: binary_sensor.workday
                state: 'on'
            currentTimeLine:
              labelColor: '#000000'
            yAxis:
              min: 0
              max: 25
              title: 0,xx €/kWh
            tariffs:
              - name: Дешёвый
                value: 15
                timeFrames:
                  - 00:00-08:00
                color: '#00E5FF'
              - name: Средний
                value: 18
                timeFrames:
                  - 08:00-10:00
                  - 14:00-18:00
                  - 22:00-24:00
                color: '#FF9800'
              - name: Дорогой
                value: 25
                timeFrames:
                  - 10:00-14:00
                  - 18:00-22:00
                color: '#FF5252'
          - type: custom:tariff-chart-card
            visibility:
              - condition: state
                entity: binary_sensor.workday
                state: 'off'
            currentTimeLine:
              labelColor: '#000000'
            yAxis:
              min: 0
              title: 0,xx €/kWh
            tariffs:
              - name: Дешёвый
                value: 15
                timeFrames:
                  - 00:00-23:00
                color: '#00E5FF'
              - name: Дешёвый
                value: 25
                timeFrames:
                  - 23:55-24:00
                color: '#00E5FF'
      - type: grid
        cards:
          - type: heading
            icon: ''
            heading: Подключиться к WiFi
            heading_style: title
          - type: picture
            image_entity: image.network_domovoy_wifi_qr_code
            grid_options:
              columns: 6
              rows: auto
      - type: grid
        cards:
          - type: heading
            heading: Люди
            heading_style: title
          - type: tile
            entity: person.andrey
            features_position: bottom
            vertical: false
            show_entity_picture: true
          - type: tile
            entity: person.kate
            features_position: bottom
            vertical: false
            show_entity_picture": true
      - type: grid
        cards:
          - type: heading
            heading: Пылесос
            heading_style: title
          - type: tile
            entity: vacuum.vacuum_q7_max
            name: Пылесос
            vertical: false
            features:
              - type: vacuum-commands
            features_position: bottom
            grid_options:
              columns: 12
              rows: 2
    cards: []
  - type: sections
    max_columns: 4
    subview: true
    path: bedroom
    title: Спальня
    sections:
