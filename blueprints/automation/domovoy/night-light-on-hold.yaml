blueprint:
  name: Ночной режим по удержанию выключателя
  domain: automation
  author: Andrey Sitnik
  source_url: https://github.com/ai/domovoy/blob/main/blueprints/automation/domovoy/night-light-on-hold.yaml
  input:
    wall_switch:
      name: Выключатель
      selector:
        device:
          filter:
            - integration: mqtt
              manufacturer: Shelly
    light_target:
      name: Лампы
      selector:
        entity:
          multiple: true
          filter:
            - domain: light
    daylight_switch:
      name: Адаптивное освещение
      default: switch.daylight_adaptive_lighting_daylight
      selector:
        entity:
          filter:
            - domain: switch

variables:
  lights: !input light_target
  daylight_switch: !input daylight_switch

mode: single

triggers:
  - trigger: device
    domain: mqtt
    device_id: !input wall_switch
    type: action
    subtype: input_1_hold

conditions: []

actions:
  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {% set ns = namespace(any_on=false, dimmed=true) %}
              {% for light in lights %}
                {% if is_state(light, 'on') %}
                  {% set ns.any_on = true %}
                  {% if state_attr(light, 'brightness') | int(0) > 2 %}
                    {% set ns.dimmed = false %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {{ ns.any_on and ns.dimmed }}
        sequence:
          - action: light.turn_on
            target:
              entity_id: !input light_target
            data:
              brightness_pct: "{{ state_attr(daylight_switch, 'brightness_pct') | round(0) }}"
              color_temp_kelvin: "{{ state_attr(daylight_switch, 'color_temp_kelvin') | int }}"
              transition: 1
    default:
      - repeat:
          for_each: !input light_target
          sequence:
            - action: light.turn_on
              target:
                entity_id: "{{ repeat.item }}"
              data:
                brightness: 1
                color_temp_kelvin: "{{ state_attr(repeat.item, 'min_color_temp_kelvin') | int(2202) }}"
                # Transition from "off" makes bulbs flash at the previous
                # brightness before dimming down
                transition: "{{ 1 if is_state(repeat.item, 'on') else 0 }}"
