views:
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Улица
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.forecast_aemet_temperature_feeling
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.forecast_aemet_humidity
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_waqi_pm2_5
      - type: grid
        cards:
          - type: heading
            heading: Дом
            heading_style: title
          - type: tile
            entity: script.turn_off_everything
            icon: mdi:lightbulb-off
            hide_state: true
            vertical: false
            features_position: bottom
      - type: grid
        cards:
          - type: heading
            heading: Спальня
            heading_style: title
            badges:
              - type: entity
                show_state: true
                show_icon: true
                entity: sensor.air_bedroom_temperature
