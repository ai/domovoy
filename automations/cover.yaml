- id: automation.andrey_shutter
  alias: Штора Андрея
  room: andrey
  triggers:
    - trigger: numeric_state
      entity_id: sun.sun
      attribute: azimuth
      above: 249
      id: sun
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'off'
      id: home
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'on'
      id: leave
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: leave
            - condition: numeric_state
              entity_id: sun.sun
              attribute: elevation
              above: 12
          sequence:
            - action: cover.close_cover
              target:
                entity_id: cover.shutter_andrey
        - conditions:
            - condition: or
              conditions:
                - condition: and
                  conditions:
                    - condition: trigger
                      id: sun
                    - condition: state
                      entity_id: input_boolean.cooling
                      state: 'on'
                - condition: and
                  conditions:
                    - condition: trigger
                      id: home
                    - condition: state
                      entity_id: input_boolean.cooling
                      state: 'on'
                    - condition: numeric_state
                      entity_id: sun.sun
                      attribute: elevation
                      above: 12
                    - condition: time
                      after: '12:00:00'
          sequence:
            - action: cover.set_cover_position
              target:
                entity_id: cover.shutter_andrey
              data:
                position: 50
        - conditions:
            - condition: trigger
              id: home
          sequence:
            - action: cover.open_cover
              target:
                entity_id: cover.shutter_andrey
  mode: single

- id: automation.bedroom_shutter
  alias: Штора спальни
  room: bedroom
  triggers:
    - trigger: time
      at:
        entity_id: input_datetime.night_end
        offset: '-01:00:00'
      id: open
    - trigger: time
      at:
        entity_id: input_datetime.night_end
        offset: '01:00:00'
      id: close
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'off'
      id: home
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'on'
      id: leave
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: leave
          sequence:
            - action: cover.close_cover
              target:
                entity_id: cover.shutter_bedroom
        - conditions:
            - condition: or
              conditions:
                - condition: trigger
                  id: open
                - condition: and
                  conditions:
                    - condition: trigger
                      id: home
                    - condition: state
                      entity_id: input_boolean.cooling
                      state: 'off'
          sequence:
            - action: cover.open_cover
              target:
                entity_id: cover.shutter_bedroom
        - conditions:
            - condition: or
              conditions:
                - condition: trigger
                  id: close
                - condition: trigger
                  id: home
            - condition: state
              entity_id: input_boolean.cooling
              state: 'on'
          sequence:
            - action: cover.set_cover_position
              target:
                entity_id: cover.shutter_bedroom
              data:
                position: 10
  mode: single

- id: automation.lounge_shutter
  alias: Штора гостиной
  room: lounge
  triggers:
    - trigger: numeric_state
      entity_id: sun.sun
      attribute: azimuth
      above: 249
      id: propose
    - trigger: event
      event_type: mobile_app_notification_action
      event_data:
        action: CLOSE_LOUNGE_SHUTTER
      id: close
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'off'
      id: home
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'on'
      id: leave
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: leave
            - condition: numeric_state
              entity_id: sun.sun
              attribute: elevation
              above: 12
          sequence:
            - action: cover.close_cover
              target:
                entity_id: cover.shutter_lounge
        - conditions:
            - condition: trigger
              id: propose
            - condition: state
              entity_id: input_boolean.cooling
              state: 'on'
            - condition: state
              entity_id: person.andrey
              state: home
          sequence:
            - action: notify.mobile_app_phone_bedoll
              data:
                title: Гостиная
                message: Прикрыть штору от солнца? Проверьте, что дверь свободна
                data:
                  tag: lounge_shutter
                  actions:
                    - action: CLOSE_LOUNGE_SHUTTER
                      title: Прикрыть
        - conditions:
            - condition: or
              conditions:
                - condition: trigger
                  id: close
                - condition: and
                  conditions:
                    - condition: trigger
                      id: home
                    - condition: state
                      entity_id: input_boolean.cooling
                      state: 'on'
                    - condition: numeric_state
                      entity_id: sun.sun
                      attribute: elevation
                      above: 12
                    - condition: time
                      after: '12:00:00'
          sequence:
            - action: cover.set_cover_position
              target:
                entity_id: cover.shutter_lounge
              data:
                position: 30
            - action: notify.mobile_app_phone_bedoll
              data:
                message: clear_notification
                data:
                  tag: lounge_shutter
        - conditions:
            - condition: trigger
              id: home
          sequence:
            - action: cover.open_cover
              target:
                entity_id: cover.shutter_lounge
  mode: single

- id: automation.open_shutter_on_low_sun
  alias: Открыть шторы при низком солнце
  triggers:
    - trigger: numeric_state
      entity_id:
        - sun.sun
      attribute: elevation
      below: 12
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - action: cover.open_cover
      target:
        entity_id:
          - cover.shutter_andrey
          - cover.shutter_lounge
  mode: single
