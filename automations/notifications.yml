- alias: Уведомить Андрея о высоком уровне CO²
  triggers:
    - trigger: numeric_state
      entity_id: sensor.presence_apollo_msr_2_co2
      above: 1000
  conditions:
    - condition: state
      entity_id: person.andrey
      state: home
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - action: notify.mobile_app_phone_bedoll
      data:
        title: Кабинет Андрея
        message: "Высокий уровень CO²: {{ states('sensor.presence_apollo_msr_2_co2') }}"
  mode: single
