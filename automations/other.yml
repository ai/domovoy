- id: automation.bathroom_fan_humidity
  alias: Вентилятор в ванной по влажности
  triggers:
    - trigger: template
      id: high
      value_template: "{% set b = states('sensor.air_bathroom_humidity')|float(none) %}{% set k = states('sensor.temperature_kitchen_humidity')|float(none) %}{{ b is not none and k is not none and (b - k) >= 5 }}"
    - trigger: template
      id: normal
      value_template: "{% set b = states('sensor.air_bathroom_humidity')|float(none) %}{% set k = states('sensor.temperature_kitchen_humidity')|float(none) %}{{ b is not none and k is not none and (b - k) < 3 }}"
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: high
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.wall_switch_bathroom_l2
        - conditions:
            - condition: trigger
              id: normal
          sequence:
            - action: switch.turn_off
              target:
                entity_id: switch.wall_switch_bathroom_l2
  mode: single
- id: automation.heating_cooling_interlock
  alias: Взаимоблокировка обогрева и охлаждения
  triggers:
    - trigger: state
      entity_id: input_boolean.cooling
      to: 'on'
      id: cooling
    - trigger: state
      entity_id: input_boolean.heating
      to: 'on'
      id: heating
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: cooling
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.heating
        - conditions:
            - condition: trigger
              id: heating
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.cooling
  mode: single
