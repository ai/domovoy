- id: automation.bathroom_fan_humidity
  alias: Вентилятор в ванной по влажности
  triggers:
    - trigger: template
      id: high
      value_template: "{% set b = states('sensor.air_bathroom_humidity')|float(none) %}{% set k = states('sensor.temperature_kitchen_humidity')|float(none) %}{{ b is not none and k is not none and (b - k) >= 10 }}"
    - trigger: template
      id: normal
      value_template: "{% set b = states('sensor.air_bathroom_humidity')|float(none) %}{% set k = states('sensor.temperature_kitchen_humidity')|float(none) %}{{ b is not none and k is not none and (b - k) < 5 }}"
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: high
          sequence:
            - action: switch.turn_on
              target:
                entity_id: switch.wall_switch_bathroom_l2
        - conditions:
            - condition: trigger
              id: normal
          sequence:
            - action: switch.turn_off
              target:
                entity_id: switch.wall_switch_bathroom_l2
  mode: single
