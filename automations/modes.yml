- id: automation.empty_home_button
  alias: Кнопка «Пустой дом»
  triggers:
    - trigger: device
      domain: mqtt
      device_id: 051afa3d576af13df00f57ac4f8a7ff6
      type: action
      subtype: on_b1_down
      id: set
    - trigger: device
      domain: mqtt
      device_id: 051afa3d576af13df00f57ac4f8a7ff6
      type: action
      subtype: toggle_b2_down
      id: clear
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: set
          sequence:
            - action: script.turn_on
              target:
                entity_id: script.empty_home
        - conditions:
            - condition: trigger
              id: clear
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.empty_home
  mode: single

- id: automation.empty_home_presence
  alias: Обновление «Пустой дом»
  triggers:
    - trigger: state
      entity_id: zone.home
      from: '0'
      id: arrived
    - trigger: state
      entity_id: zone.home
      to: '0'
      id: emptied
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: arrived
          sequence:
            - action: input_boolean.turn_off
              target:
                entity_id: input_boolean.empty_home
        - conditions:
            - condition: trigger
              id: emptied
            - condition: state
              entity_id: timer.empty_home
              state: active
          sequence:
            - action: input_boolean.turn_on
              target:
                entity_id: input_boolean.empty_home
  mode: single

- id: automation.empty_home_devices
  alias: Реакция дома на «Пустой дом»
  triggers:
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'on'
      id: 'on'
    - trigger: state
      entity_id: input_boolean.empty_home
      to: 'off'
      id: 'off'
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  actions:
    - choose:
        - conditions:
            - condition: trigger
              id: 'on'
          sequence:
            - if:
                - condition: numeric_state
                  entity_id: sun.sun
                  attribute: elevation
                  above: 10
              then:
                - action: cover.close_cover
                  target:
                    entity_id: cover.shutter_andrey
                - action: cover.set_cover_position
                  target:
                    entity_id: cover.shutter_lounge
                  data:
                    position: 10
            - action: switch.turn_off
              target:
                entity_id: switch.wall_switch_toilet_l2
            - action: script.turn_off_everything
        - conditions:
            - condition: trigger
              id: 'off'
          sequence:
            - if:
                - condition: state
                  entity_id: input_boolean.cooling
                  state: 'on'
                - condition: time
                  after: '12:00:00'
                - condition: numeric_state
                  entity_id: sun.sun
                  attribute: elevation
                  above: 12
              then:
                - action: cover.set_cover_position
                  target:
                    entity_id:
                      - cover.shutter_lounge
                  data:
                    position: 30
                - action: cover.set_cover_position
                  target:
                    entity_id: cover.shutter_andrey
                  data:
                    position: 50
              else:
                - action: cover.open_cover
                  target:
                    entity_id:
                      - cover.shutter_andrey
                      - cover.shutter_lounge
            - action: switch.turn_on
              target:
                entity_id: switch.wall_switch_toilet_l2
  mode: single
