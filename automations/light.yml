- id: automation.wall_switch_andrey
  alias: Выключатель света в кабинете Андрея
  conditions:
    - condition: state
      entity_id: input_boolean.stop
      state: 'off'
  use_blueprint:
    path: domovoy/wall-switch.yaml
    input:
      wall_switch: 2d30ab78a44cd462ac7d142927c6e6b5
      light_group: light.light_group_andrey
      adaptive_switch: switch.adaptive_lighting_private_adaptive_lighting_daylight
