blueprint:
  name: Настенный выключатель
  domain: automation
  author: Andrey Sitnik
  source_url: https://github.com/ai/domovoy/blob/main/blueprints/automation/domovoy/wall-switch.yaml
  input:
    wall_switch:
      name: Выключатель
      selector:
        device:
          filter:
            - integration: shelly
    light_group:
      name: Группа ламп
      selector:
        entity:
          filter:
            - domain: light
    adaptive_switch:
      name: Адаптивное освещение
      default: ''
      selector:
        entity:
          filter:
            - domain: switch
              integration: adaptive_lighting

variables:
  light_group: !input light_group
  adaptive_switch: !input adaptive_switch

mode: single

triggers:
  - trigger: device
    id: single
    domain: shelly
    device_id: !input wall_switch
    type: single_push
    subtype: button1
  - trigger: device
    id: hold
    domain: shelly
    device_id: !input wall_switch
    type: long_push
    subtype: button1

conditions: []

actions:
  - if:
      - condition: trigger
        id: single
    then:
      - if:
          - condition: state
            entity_id: !input light_group
            state: 'off'
        then:
          - if:
              - condition: template
                value_template: "{{ adaptive_switch != '' }}"
            then:
              - action: light.turn_on
                target:
                  entity_id: !input light_group
            else:
              # No Adaptive Lighting: override night mode brightness
              # remembered by bulbs from the previous cycle
              - action: light.turn_on
                target:
                  entity_id: !input light_group
                data:
                  brightness: 255
        else:
          - action: light.turn_off
            target:
              entity_id: !input light_group
    else:
      - if:
          - condition: template
            value_template: >-
              {{ is_state(light_group, 'on') and
                 state_attr(light_group, 'brightness') | int(0) <= 2 }}
        then:
          - if:
              - condition: template
                value_template: "{{ adaptive_switch != '' }}"
            then:
              # Leaving night mode with Adaptive Lighting: apply its current
              # values in a single group command, then return control to it
              - action: adaptive_lighting.set_manual_control
                data:
                  entity_id: !input adaptive_switch
                  lights:
                    - !input light_group
                  manual_control: false
              - action: adaptive_lighting.apply
                data:
                  entity_id: !input adaptive_switch
                  lights:
                    - !input light_group
                  transition: 0
            else:
              # No Adaptive Lighting: leave night mode at full brightness
              - action: light.turn_on
                target:
                  entity_id: !input light_group
                data:
                  brightness: 255
        else:
          # Night mode: the explicit brightness disable Adaptive Lighting
          - action: light.turn_on
            target:
              entity_id: !input light_group
            data:
              brightness: 1
              color_temp_kelvin: "{{ state_attr(light_group, 'min_color_temp_kelvin') | int(2202) }}"
              # Transition from "off" makes bulbs flash at the previous
              # brightness before dimming down
              transition: "{{ 1 if is_state(light_group, 'on') else 0 }}"
